<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分析報表 — 瑞昌藥局 人時生產力預警系統</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-wrapper">

  <!-- Sidebar -->
  <nav class="sidebar">
    <a href="index.html" class="sidebar-brand">
      <div class="brand-icon"><i class="bi bi-graph-up-arrow"></i></div>
      <span class="brand-title">瑞昌藥局</span>
      <span class="brand-sub">人時生產力預警系統</span>
    </a>
    <div class="sidebar-nav">
      <div class="sidebar-section-label">主要功能</div>
      <a href="index.html"><span class="nav-icon"><i class="bi bi-speedometer2"></i></span> 總覽儀表板</a>
      <a href="input.html"><span class="nav-icon"><i class="bi bi-pencil-square"></i></span> 輸入月份資料</a>
      <a href="reports.html" class="active"><span class="nav-icon"><i class="bi bi-bar-chart-line"></i></span> 分析報表</a>
      <div class="sidebar-section-label" style="margin-top:0.75rem;">管理</div>
      <a href="stores.html"><span class="nav-icon"><i class="bi bi-shop"></i></span> 門市管理</a>
      <a href="employees.html"><span class="nav-icon"><i class="bi bi-people"></i></span> 員工管理</a>
    </div>
    <div class="sidebar-footer">瑞昌藥局 &copy; 2024</div>
  </nav>

  <div class="main-content">
    <header class="page-header">
      <div class="page-header-title">
        <i class="bi bi-bar-chart-line text-primary"></i> 生產力分析報表
      </div>
      <div class="page-header-actions">
        <button class="btn btn-success btn-sm" onclick="exportCSV()">
          <i class="bi bi-download"></i> 匯出 CSV
        </button>
      </div>
    </header>

    <div class="page-content">

      <!-- Filter Bar -->
      <div class="form-section mb-3" style="padding:0.875rem 1.25rem;">
        <div class="d-flex align-center gap-3 flex-wrap">
          <div class="d-flex align-center gap-2">
            <label class="fw-600 fs-sm text-nowrap">篩選門市：</label>
            <select id="reportStoreId" class="form-control" style="width:auto;min-width:130px;">
              <option value="">全部門市</option>
            </select>
          </div>
          <div class="d-flex align-center gap-2">
            <label class="fw-600 fs-sm text-nowrap">比較月份：</label>
            <select id="comparisonMonth" class="form-control" style="width:auto;min-width:120px;"></select>
          </div>
          <button class="btn btn-outline btn-sm" onclick="loadReports()">
            <i class="bi bi-arrow-clockwise"></i> 重新整理
          </button>
        </div>
      </div>

      <!-- Section 1: Cross-store Comparison -->
      <div class="row g-3 mb-3">
        <div class="col-lg-8">
          <div class="chart-container">
            <div class="chart-title d-flex align-center justify-between">
              <span><i class="bi bi-bar-chart text-primary"></i> 門市生產力比較 (橫向)</span>
              <span class="text-muted fs-xs">依達成率排色</span>
            </div>
            <div style="height:280px;">
              <canvas id="comparisonChart"></canvas>
            </div>
          </div>
        </div>
        <div class="col-lg-4">
          <div class="table-container" style="height:340px;overflow-y:auto;">
            <div class="table-header" style="position:sticky;top:0;background:white;z-index:1;">
              <div class="table-title"><i class="bi bi-trophy"></i> 門市排行</div>
            </div>
            <table>
              <thead>
                <tr>
                  <th>排名</th>
                  <th>門市</th>
                  <th>生產力</th>
                  <th>目標</th>
                  <th>達成率</th>
                  <th>狀態</th>
                </tr>
              </thead>
              <tbody id="rankingTableBody">
                <tr><td colspan="6" class="text-center py-3 text-muted">載入中...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Section 2: Trend Chart -->
      <div class="chart-container mb-3">
        <div class="chart-title d-flex align-center justify-between">
          <span><i class="bi bi-graph-up text-primary"></i> 各門市生產力趨勢 (近6個月)</span>
          <span class="text-muted fs-xs">虛線為目標生產力</span>
        </div>
        <div style="height:320px;">
          <canvas id="trendChart"></canvas>
        </div>
      </div>

      <!-- Section 3: Data Table -->
      <div class="table-container">
        <div class="table-header">
          <div class="table-title"><i class="bi bi-table"></i> 月份明細資料</div>
          <button class="btn btn-success btn-sm" onclick="exportCSV()">
            <i class="bi bi-download"></i> 匯出 CSV
          </button>
        </div>
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>月份</th>
                <th>門市</th>
                <th>加權工時</th>
                <th>營收</th>
                <th>生產力</th>
                <th>達成率</th>
                <th>狀態</th>
              </tr>
            </thead>
            <tbody id="monthlyTableBody">
              <tr><td colspan="7" class="text-center py-4 text-muted">載入中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Cost Analysis Info -->
      <div class="alert alert-info mt-3">
        <i class="bi bi-info-circle"></i>
        <strong>計算說明：</strong>
        生產力 = 營收 ÷ 加權工時 &nbsp;|&nbsp;
        加權工時 = 總工時 × 員工平均加權係數（含年資與職位係數）&nbsp;|&nbsp;
        達成率 = (生產力 ÷ 目標生產力) × 100%
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="js/app.js"></script>
<script src="js/reports.js"></script>
</body>
</html>
