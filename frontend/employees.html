<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>員工管理 — 瑞昌藥局 人時生產力預警系統</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-wrapper">

  <!-- Sidebar -->
  <nav class="sidebar">
    <a href="index.html" class="sidebar-brand">
      <div class="brand-icon"><i class="bi bi-graph-up-arrow"></i></div>
      <span class="brand-title">瑞昌藥局</span>
      <span class="brand-sub">人時生產力預警系統</span>
    </a>
    <div class="sidebar-nav">
      <div class="sidebar-section-label">主要功能</div>
      <a href="index.html"><span class="nav-icon"><i class="bi bi-speedometer2"></i></span> 總覽儀表板</a>
      <a href="input.html"><span class="nav-icon"><i class="bi bi-pencil-square"></i></span> 輸入月份資料</a>
      <a href="reports.html"><span class="nav-icon"><i class="bi bi-bar-chart-line"></i></span> 分析報表</a>
      <div class="sidebar-section-label" style="margin-top:0.75rem;">管理</div>
      <a href="stores.html"><span class="nav-icon"><i class="bi bi-shop"></i></span> 門市管理</a>
      <a href="employees.html" class="active"><span class="nav-icon"><i class="bi bi-people"></i></span> 員工管理</a>
    </div>
    <div class="sidebar-footer">瑞昌藥局 &copy; 2024</div>
  </nav>

  <div class="main-content">
    <header class="page-header">
      <div class="page-header-title">
        <i class="bi bi-people text-primary"></i> 員工管理
      </div>
      <div class="page-header-actions">
        <button class="btn btn-outline btn-sm" onclick="exportEmployees()">
          <i class="bi bi-download"></i> 匯出 Excel
        </button>
        <button class="btn btn-outline btn-sm" onclick="document.getElementById('importFile').click()">
          <i class="bi bi-upload"></i> 匯入 Excel
        </button>
        <input type="file" id="importFile" accept=".xlsx,.csv" style="display:none" onchange="importEmployees(this)">
        <button class="btn btn-primary btn-sm" onclick="openAddModal()">
          <i class="bi bi-person-plus"></i> 新增員工
        </button>
      </div>
    </header>

    <div class="page-content">

      <!-- Weight Info Panel -->
      <div class="alert alert-info mb-3">
        <i class="bi bi-info-circle"></i>
        <strong>加權係數說明：</strong>
        年資加權：資深(≥3年)=1.2 / 中級(1-2年)=1.0 / 新進(<1年)=0.8 &nbsp;|&nbsp;
        職位加權：店長=1.3 / 副店長=1.15 / 藥師=1.2 / 正職=1.0 / 兼職=0.85
      </div>

      <!-- Filter Bar -->
      <div class="table-container">
        <div class="table-header">
          <div class="table-title">
            <i class="bi bi-people"></i> 員工名單
            <span id="empStats" class="text-muted" style="font-size:0.78rem;margin-left:0.5rem;font-weight:400;"></span>
          </div>
          <div class="d-flex gap-2 align-center flex-wrap">
            <select id="storeFilter" class="form-control" style="width:auto;min-width:130px;">
              <option value="">全部門市</option>
            </select>
            <div class="search-input-wrapper">
              <span class="search-icon"><i class="bi bi-search"></i></span>
              <input type="text" id="searchInput" class="form-control" placeholder="搜尋姓名/職位/門市" style="width:200px;">
            </div>
            <button class="btn btn-outline btn-sm" onclick="loadEmployees()">
              <i class="bi bi-arrow-clockwise"></i>
            </button>
          </div>
        </div>

        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>員工姓名</th>
                <th>所屬門市</th>
                <th>職位</th>
                <th>到職日期</th>
                <th>年資</th>
                <th>加權係數</th>
                <th>時薪</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="employeeTableBody">
              <tr><td colspan="8" class="text-center py-4"><div class="spinner" style="margin:auto"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Employee Add/Edit Modal -->
<div class="modal fade" id="employeeModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="employeeModalTitle">新增員工</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="employeeForm">
          <div class="form-grid">
            <div class="form-group">
              <label>所屬門市 <span class="required">*</span></label>
              <select id="empStoreId" class="form-control" required>
                <option value="">請選擇門市</option>
              </select>
            </div>
            <div class="form-group">
              <label>員工姓名 <span class="required">*</span></label>
              <input type="text" id="empName" class="form-control" required placeholder="請輸入姓名">
            </div>
            <div class="form-group">
              <label>職位 <span class="required">*</span></label>
              <select id="empPosition" class="form-control" required>
                <option value="">請選擇職位</option>
                <option value="店長">店長</option>
                <option value="副店長">副店長</option>
                <option value="藥師">藥師</option>
                <option value="正職">正職</option>
                <option value="兼職">兼職</option>
              </select>
            </div>
            <div class="form-group">
              <label>到職日期 <span class="required">*</span></label>
              <input type="date" id="empHireDate" class="form-control" required>
            </div>
            <div class="form-group">
              <label>年資 (年) <span class="required">*</span></label>
              <input type="number" id="empSeniority" class="form-control" required
                     min="0" max="50" step="0.1" placeholder="例: 2.5">
            </div>
            <div class="form-group">
              <label>時薪 (NT$) <span class="required">*</span></label>
              <input type="number" id="empHourlyRate" class="form-control" required
                     min="100" step="10" placeholder="例: 200">
            </div>
          </div>
          <div class="mt-3 p-2 rounded" style="background:#f8fafc;border:1px solid #e5e7eb;">
            <div id="weightPreview" class="fs-xs text-muted">
              加權係數: — (請填入年資與職位)
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" data-bs-dismiss="modal">取消</button>
        <button type="submit" form="employeeForm" id="empSubmitBtn" class="btn btn-primary">
          <i class="bi bi-check-lg"></i> 儲存
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script src="js/employees.js"></script>
</body>
</html>
