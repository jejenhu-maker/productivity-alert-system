<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>門市管理 — 瑞昌藥局 人時生產力預警系統</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-wrapper">

  <!-- Sidebar -->
  <nav class="sidebar">
    <a href="index.html" class="sidebar-brand">
      <div class="brand-icon"><i class="bi bi-graph-up-arrow"></i></div>
      <span class="brand-title">瑞昌藥局</span>
      <span class="brand-sub">人時生產力預警系統</span>
    </a>
    <div class="sidebar-nav">
      <div class="sidebar-section-label">主要功能</div>
      <a href="index.html"><span class="nav-icon"><i class="bi bi-speedometer2"></i></span> 總覽儀表板</a>
      <a href="input.html"><span class="nav-icon"><i class="bi bi-pencil-square"></i></span> 輸入月份資料</a>
      <a href="reports.html"><span class="nav-icon"><i class="bi bi-bar-chart-line"></i></span> 分析報表</a>
      <div class="sidebar-section-label" style="margin-top:0.75rem;">管理</div>
      <a href="stores.html" class="active"><span class="nav-icon"><i class="bi bi-shop"></i></span> 門市管理</a>
      <a href="employees.html"><span class="nav-icon"><i class="bi bi-people"></i></span> 員工管理</a>
    </div>
    <div class="sidebar-footer">瑞昌藥局 &copy; 2024</div>
  </nav>

  <div class="main-content">
    <header class="page-header">
      <div class="page-header-title">
        <i class="bi bi-shop text-primary"></i> 門市管理
      </div>
      <div class="page-header-actions">
        <button class="btn btn-primary btn-sm" onclick="openAddStoreModal()">
          <i class="bi bi-plus-lg"></i> 新增門市
        </button>
      </div>
    </header>

    <div class="page-content">

      <!-- Summary -->
      <div id="storeSummary" class="summary-cards" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr))"></div>

      <!-- Stores Table -->
      <div class="table-container mt-3">
        <div class="table-header">
          <div class="table-title"><i class="bi bi-shop"></i> 門市列表</div>
          <button class="btn btn-outline btn-sm" onclick="loadStores()">
            <i class="bi bi-arrow-clockwise"></i> 重新整理
          </button>
        </div>
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>門市名稱</th>
                <th>代碼</th>
                <th>目標生產力</th>
                <th>狀態</th>
                <th>員工人數</th>
                <th>最後更新</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="storeTableBody">
              <tr><td colspan="7" class="text-center py-4"><div class="spinner" style="margin:auto"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Target Info -->
      <div class="alert alert-info mt-3">
        <i class="bi bi-lightbulb"></i>
        <strong>目標生產力設定：</strong>
        目標生產力是每加權工時的目標營收 (NT$/hr)。達成率 = 實際生產力 / 目標生產力 × 100%。
        建議依據門市規模、地段與歷史數據設定合理目標值。
      </div>

    </div>
  </div>
</div>

<!-- Store Add/Edit Modal -->
<div class="modal fade" id="storeModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="storeModalTitle">新增門市</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="storeForm">
          <div class="form-grid">
            <div class="form-group">
              <label>門市名稱 <span class="required">*</span></label>
              <input type="text" id="storeName" class="form-control" required placeholder="例: 興安店">
            </div>
            <div class="form-group">
              <label>門市代碼 <span class="required">*</span></label>
              <input type="text" id="storeCode" class="form-control" required
                     placeholder="例: XA" maxlength="10"
                     style="text-transform:uppercase;">
            </div>
            <div class="form-group" style="grid-column:1/-1;">
              <label>目標生產力 (NT$/hr) <span class="required">*</span></label>
              <input type="number" id="storeTarget" class="form-control" required
                     min="1000" max="20000" step="100" placeholder="例: 5000">
              <div class="text-muted fs-xs mt-1">
                建議範圍：3,000 - 10,000 NT$/hr
              </div>
            </div>
            <div class="form-group" style="grid-column:1/-1;">
              <label>狀態</label>
              <select id="storeStatus" class="form-control">
                <option value="active">營業中</option>
                <option value="inactive">停用</option>
              </select>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" data-bs-dismiss="modal">取消</button>
        <button type="submit" form="storeForm" id="storeSubmitBtn" class="btn btn-primary">
          <i class="bi bi-check-lg"></i> 儲存
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script src="js/stores.js"></script>
</body>
</html>
